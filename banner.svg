<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <!-- Background gradient: deep dark blue-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Chrome rainbow accent gradient -->
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4285f4"/>
      <stop offset="25%"  stop-color="#34a853"/>
      <stop offset="50%"  stop-color="#fbbc05"/>
      <stop offset="75%"  stop-color="#ea4335"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    <!-- Folder gradient -->
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <!-- Glow filter for title -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle inner glow for card -->
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#4a9eff" flood-opacity="0.15"/>
    </filter>
    <clipPath id="round">
      <rect width="860" height="220" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.04" clip-path="url(#round)">
    <line x1="0" y1="40" x2="860" y2="40" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="860" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="860" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="860" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="860" y2="200" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="220" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="220" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="220" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="220" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="220" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="220" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="220" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="220" stroke="white" stroke-width="1"/>
  </g>

  <!-- Chrome rainbow top bar -->
  <rect x="0" y="0" width="860" height="4" rx="0" fill="url(#chrome)"/>
  <rect x="0" y="0" width="860" height="4" rx="0" fill="url(#chrome)" opacity="0.4"/>

  <!-- Left: Folder icon (large) -->
  <g transform="translate(44, 60)">
    <!-- Folder shadow -->
    <path d="M4 26a8 8 0 0 1 8-8h22l11 11H92a8 8 0 0 1 8 8v36a8 8 0 0 1-8 8H12a8 8 0 0 1-8-8z" fill="#1e3a5f" opacity="0.5"/>
    <!-- Folder body -->
    <path d="M2 24a8 8 0 0 1 8-8h22l11 11H90a8 8 0 0 1 8 8v36a8 8 0 0 1-8 8H10a8 8 0 0 1-8-8z" fill="url(#folder)"/>
    <!-- Highlight -->
    <path d="M2 24a8 8 0 0 1 8-8h22l5 5H2z" fill="white" opacity="0.18"/>
    <!-- File lines -->
    <line x1="22" y1="50" x2="50" y2="50" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="22" y1="62" x2="68" y2="62" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="22" y1="74" x2="40" y2="74" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <!-- Magnifier -->
    <circle cx="74" cy="62" r="12" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    <line x1="82" y1="71" x2="90" y2="79" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Chrome logo (right of folder) -->
  <g transform="translate(162, 76)">
    <!-- Chrome outer ring rainbow -->
    <circle cx="22" cy="22" r="22" fill="none" stroke="url(#chrome)" stroke-width="4"/>
    <!-- Chrome inner blue circle -->
    <circle cx="22" cy="22" r="10" fill="#4285f4"/>
    <!-- Chrome color segments (simplified) -->
    <path d="M22 0 L22 12 A10 10 0 0 1 30.7 17 Z" fill="#ea4335"/>
    <path d="M22 12 A10 10 0 0 1 30.7 17 L40 3.7 A22 22 0 0 0 22 0 Z" fill="#ea4335" opacity="0.7"/>
    <path d="M30.7 17 L40.6 28 A22 22 0 0 0 44 22 A22 22 0 0 0 40 3.7 Z" fill="#fbbc05"/>
    <path d="M40.6 28 L30 33 A10 10 0 0 1 13.3 27 L2.5 37 A22 22 0 0 0 40.6 28 Z" fill="#34a853"/>
    <path d="M13.3 27 A10 10 0 0 1 13.3 17 L3.4 6 A22 22 0 0 0 2.5 37 Z" fill="#4285f4"/>
    <path d="M3.4 6 L13.3 17 A10 10 0 0 1 22 12 L22 0 A22 22 0 0 0 3.4 6 Z" fill="#ea4335"/>
    <!-- Center white circle -->
    <circle cx="22" cy="22" r="9" fill="white"/>
    <circle cx="22" cy="22" r="7" fill="#4285f4"/>
  </g>

  <!-- Title text -->
  <text x="222" y="115" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="38" font-weight="800" fill="white" filter="url(#glow)" letter-spacing="-0.5">
    Better File Browser
  </text>

  <!-- Subtitle -->
  <text x="224" y="144" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="15" fill="#8b949e" letter-spacing="0.3">
    A Chrome extension that transforms plain
    <tspan fill="#4a9eff">file://</tspan>
    listings into a rich, modern explorer
  </text>

  <!-- Feature pills row -->
  <g transform="translate(224, 162)">
    <!-- Pill 1: 4 View Modes -->
    <rect x="0" y="0" width="104" height="26" rx="13" fill="#1f6feb" opacity="0.3"/>
    <rect x="0" y="0" width="104" height="26" rx="13" fill="none" stroke="#1f6feb" stroke-width="1"/>
    <text x="52" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#79c0ff">4 View Modes</text>

    <!-- Pill 2: Live Search -->
    <rect x="114" y="0" width="96" height="26" rx="13" fill="#1a7f37" opacity="0.3"/>
    <rect x="114" y="0" width="96" height="26" rx="13" fill="none" stroke="#238636" stroke-width="1"/>
    <text x="162" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#56d364">Live Search</text>

    <!-- Pill 3: Dark / Light -->
    <rect x="220" y="0" width="96" height="26" rx="13" fill="#6e40c9" opacity="0.3"/>
    <rect x="220" y="0" width="96" height="26" rx="13" fill="none" stroke="#8957e5" stroke-width="1"/>
    <text x="268" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#d2a8ff">Dark / Light</text>

    <!-- Pill 4: Bookmarks -->
    <rect x="326" y="0" width="96" height="26" rx="13" fill="#9e6a03" opacity="0.3"/>
    <rect x="326" y="0" width="96" height="26" rx="13" fill="none" stroke="#d29922" stroke-width="1"/>
    <text x="374" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#e3b341">Bookmarks</text>

    <!-- Pill 5: Ghostty -->
    <rect x="432" y="0" width="96" height="26" rx="13" fill="#da3633" opacity="0.2"/>
    <rect x="432" y="0" width="96" height="26" rx="13" fill="none" stroke="#f85149" stroke-width="1"/>
    <text x="480" y="17" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#ff7b72">Ghostty ↗</text>
  </g>

  <!-- Version badge top-right -->
  <rect x="778" y="14" width="64" height="22" rx="11" fill="#21262d"/>
  <rect x="778" y="14" width="64" height="22" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="810" y="28" text-anchor="middle" font-family="'SF Mono', Consolas, monospace" font-size="11" fill="#8b949e">v 2.1</text>

  <!-- Bottom border line -->
  <rect x="0" y="216" width="860" height="4" rx="0" fill="url(#chrome)" opacity="0.5"/>
</svg>
