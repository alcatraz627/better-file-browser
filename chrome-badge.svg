<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect width="220" height="48" rx="10" fill="url(#bg)"/>
  <rect width="220" height="48" rx="10" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- Chrome logo at left -->
  <g transform="translate(12, 8)">
    <!-- Outer ring with Chrome colors -->
    <circle cx="16" cy="16" r="16" fill="white"/>
    <!-- Red segment top -->
    <path d="M16 0 A16 16 0 0 1 29.9 8 L16 16 Z" fill="#ea4335"/>
    <!-- Yellow segment right -->
    <path d="M29.9 8 A16 16 0 0 1 29.9 24 L16 16 Z" fill="#fbbc05"/>
    <!-- Green segment left -->
    <path d="M29.9 24 A16 16 0 0 1 2.1 24 L16 16 Z" fill="#34a853"/>
    <!-- Blue segment -->
    <path d="M2.1 24 A16 16 0 0 1 2.1 8 L16 16 Z" fill="#4285f4"/>
    <!-- Center white circle -->
    <circle cx="16" cy="16" r="7" fill="white"/>
    <!-- Center blue circle -->
    <circle cx="16" cy="16" r="5.5" fill="#4285f4"/>
  </g>

  <!-- Divider -->
  <line x1="54" y1="10" x2="54" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Text: Chrome Extension -->
  <text x="66" y="19" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" fill="#8b949e" letter-spacing="0.8" font-weight="500">CHROME EXTENSION</text>

  <!-- Text: v2.1 -->
  <text x="66" y="36" font-family="'SF Mono', Consolas, monospace"
        font-size="14" fill="#58a6ff" font-weight="700" letter-spacing="-0.3">v 2.1</text>

  <!-- Manifest V3 pill -->
  <rect x="148" y="27" width="60" height="15" rx="7" fill="#1f6feb" opacity="0.25"/>
  <rect x="148" y="27" width="60" height="15" rx="7" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.6"/>
  <text x="178" y="38" text-anchor="middle" font-family="'SF Mono', Consolas, monospace"
        font-size="9" fill="#58a6ff" font-weight="600">MV3</text>

</svg>
